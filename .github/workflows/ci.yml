name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: ESLint (informational until the backlog is cleared)
        run: npx nx run @nota.app/nota.app:lint

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit (informational)
        continue-on-error: true
        run: npm audit

      - name: Test web app
        run: npx nx run @nota.app/nota.app:test --outputStyle=static
        env:
          CI: 'true'

      - name: Build web app and marketing site
        run: npx nx run-many -t build --projects=@nota.app/nota.app,@nota.app/nota-marketing --outputStyle=static
        env:
          CI: 'true'
