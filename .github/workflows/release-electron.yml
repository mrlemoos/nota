name: Release Electron (macOS)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver for this build (e.g. 1.2.3), written to apps/nota-electron/package.json'
        required: true
        type: string
      release_kind:
        description: 'Production = published GitHub release; release candidate = draft (not offered as latest to electron-updater until published)'
        required: true
        type: choice
        default: production
        options:
          - production
          - release_candidate

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-latest
    environment: Production
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: .pnpm-store
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: corepack enable pnpm && pnpm install --frozen-lockfile

      - name: Set Electron package version from tag or input
        id: version_info
        working-directory: apps/nota-electron
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          pnpm pkg set "version=$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Prepare Apple code signing (optional)
        id: signing
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE_BASE64" ]; then
            exit 0
          fi
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/nota-certificate.p12"
          security create-keychain -p actions nota-build.keychain
          security default-keychain -s nota-build.keychain
          security unlock-keychain -p actions nota-build.keychain
          security set-keychain-settings -lut 21600 nota-build.keychain
          security import "$RUNNER_TEMP/nota-certificate.p12" -k nota-build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions nota-build.keychain
          echo "csc_link=$RUNNER_TEMP/nota-certificate.p12" >> "$GITHUB_OUTPUT"

      - name: Verify Vite client env (fail fast)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ] || [ -z "$VITE_CLERK_PUBLISHABLE_KEY" ]; then
            echo '::error::VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY, and VITE_CLERK_PUBLISHABLE_KEY must be set for the Production environment (or as repository secrets). Exact names; Variables need vars.* in the workflow — see apps/nota-electron/README.md.'
            exit 1
          fi

      - name: Decide GitHub release draft (release candidates)
        id: release_draft
        run: |
          DRAFT=false
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.release_kind }}" = "release_candidate" ]; then
              DRAFT=true
            fi
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
            if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+- ]]; then
              DRAFT=true
            fi
          fi
          echo "draft=$DRAFT" >> "$GITHUB_OUTPUT"

      - name: Build web app and publish Electron release
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_NOTA_SERVER_API_URL: ${{ secrets.VITE_NOTA_SERVER_API_URL }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ "${{ steps.release_draft.outputs.draft }}" = "true" ]; then
            export EP_DRAFT=true
          fi
          CSC_LINK_VALUE='${{ steps.signing.outputs.csc_link }}'
          if [ -n "$CSC_LINK_VALUE" ]; then
            export CSC_LINK="$CSC_LINK_VALUE"
            export CSC_KEY_PASSWORD='${{ secrets.APPLE_CERTIFICATE_PASSWORD }}'
          fi
          pnpm exec nx run @nota/nota-electron:electron:release

      - name: Generate release notes from commits (between tags)
        env:
          TAG: ${{ steps.version_info.outputs.tag }}
          SHA: ${{ github.sha }}
        run: |
          PREV_TAG="$(gh release list --limit 30 --json tagName --jq "[.[] | select(.tagName != \"$TAG\")][0].tagName // \"\"")"

          if [ -n "$PREV_TAG" ]; then
            gh api --method POST "repos/${{ github.repository }}/releases/generate-notes" \
              -f tag_name="$TAG" \
              -f target_commitish="$SHA" \
              -f previous_tag_name="$PREV_TAG" \
              --jq '.body' > "$RUNNER_TEMP/release-notes.md"
          else
            gh api --method POST "repos/${{ github.repository }}/releases/generate-notes" \
              -f tag_name="$TAG" \
              -f target_commitish="$SHA" \
              --jq '.body' > "$RUNNER_TEMP/release-notes.md"
          fi

      - name: Update GitHub release body with generated notes
        env:
          TAG: ${{ steps.version_info.outputs.tag }}
        run: |
          for _ in 1 2 3 4 5; do
            if gh release view "$TAG" >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          gh release edit "$TAG" --notes-file "$RUNNER_TEMP/release-notes.md"
