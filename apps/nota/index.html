<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <meta
      name="theme-color"
      content="#ffffff"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#0a0a0a"
      media="(prefers-color-scheme: dark)"
    />
    <meta name="theme-color" content="#ffffff" id="nota-theme-color" />
    <title>Nota - Notes App</title>
    <script>
      (function () {
        var key = 'nota-ui-theme';
        var stored = localStorage.getItem(key);
        var systemDark = window.matchMedia(
          '(prefers-color-scheme: dark)',
        ).matches;
        var dark =
          stored === 'dark' ||
          (stored !== 'light' &&
            (stored === 'system' || stored === null) &&
            systemDark);
        var root = document.documentElement;
        var meta =
          document.getElementById('nota-theme-color') ||
          document.querySelector('meta[name="theme-color"]');
        if (dark) {
          root.classList.add('dark');
          if (meta) meta.setAttribute('content', '#0a0a0a');
        } else {
          root.classList.add('light');
          if (meta) meta.setAttribute('content', '#ffffff');
        }
        if (meta) meta.removeAttribute('media');
      })();
    </script>
    <script>
      window.nota && document.documentElement.classList.add('nota-electron');
    </script>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="font-sans">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
